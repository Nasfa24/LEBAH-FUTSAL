<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garda Futsal - Sistem Klasemen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { neon: '#39ff14', dark: '#121212', gold: '#FFD700' } } } }
    </script>
</head>
<body class="bg-dark text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full bg-gray-900 rounded-xl shadow-2xl p-8 border border-gray-800 relative">
        <h1 class="text-4xl font-black text-center mb-2 italic tracking-wider">GARDA<span class="text-neon">FUTSAL</span></h1>
        <p class="text-gray-400 text-center mb-8 text-sm">Pilih Mode Permainan</p>

        <!-- MODE RUTINAN / KOMUNITAS (Sistem Lama) -->
        <div class="mb-6 p-5 bg-gray-800 rounded-lg border border-gray-700">
            <h2 class="text-xl font-black mb-1 text-white">Mode Komunitas</h2>
            <p class="text-xs text-gray-400 mb-4">Sistem Americano Individu (Acak Total)</p>
            
            <div class="space-y-3 border-t border-gray-700 pt-4">
                <input type="text" id="roomCodeInput" placeholder="KODE ROOM PEMAIN" 
                       class="w-full p-3 rounded bg-gray-900 border border-gray-600 text-white focus:border-neon focus:outline-none uppercase text-center font-bold tracking-widest">
                <button onclick="joinRoom()" class="w-full bg-neon text-black font-black py-3 rounded hover:bg-green-400 transition shadow-[0_0_10px_rgba(57,255,20,0.2)]">
                    MASUK SEBAGAI PEMAIN
                </button>
                <div class="flex items-center my-2"><hr class="flex-grow border-gray-700"><span class="px-2 text-xs text-gray-500">ATAU</span><hr class="flex-grow border-gray-700"></div>
                <button onclick="createRoom()" class="w-full bg-gray-700 text-white font-bold py-3 rounded hover:bg-gray-600 transition">
                    BUAT ROOM PANITIA
                </button>
            </div>
        </div>

        <!-- MODE TURNAMEN ANTAR SEKOLAH (Sistem Baru) -->
        <div class="p-5 bg-black rounded-lg border border-yellow-600 shadow-[0_0_15px_rgba(218,165,32,0.15)] relative overflow-hidden">
            <div class="absolute top-0 right-0 bg-yellow-600 text-black text-[10px] font-black px-2 py-1 rounded-bl-lg">NEW</div>
            <h2 class="text-xl font-black mb-1 text-gold">Mode Turnamen</h2>
            <p class="text-xs text-gray-400 mb-4">Sistem Agregat Sekolah & Grand Final</p>
            
            <div class="space-y-3 border-t border-gray-800 pt-4">
                <input type="text" id="tourneyCodeInput" placeholder="KODE TURNAMEN" 
                       class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-gold focus:border-gold focus:outline-none uppercase text-center font-bold tracking-widest placeholder-gray-600">
                <button onclick="joinTourney()" class="w-full bg-gradient-to-r from-yellow-600 to-yellow-500 text-black font-black py-3 rounded hover:from-yellow-500 hover:to-yellow-400 transition shadow-[0_0_10px_rgba(255,215,0,0.3)]">
                    PANTAU KLASEMEN TURNAMEN
                </button>
                <div class="flex items-center my-2"><hr class="flex-grow border-gray-800"><span class="px-2 text-xs text-gray-600">ATAU</span><hr class="flex-grow border-gray-800"></div>
                <button onclick="createTourney()" class="w-full bg-gray-800 border border-yellow-900 text-yellow-500 font-bold py-3 rounded hover:bg-gray-700 transition">
                    PANEL PANITIA TURNAMEN
                </button>
            </div>
        </div>
    </div>

    <!-- Tombol Reset Data Lokal -->
    <button onclick="resetData()" class="mt-6 text-sm text-gray-600 hover:text-red-400 transition flex items-center gap-1">
        <span>⚙️</span> Bersihkan Cache Perangkat
    </button>

    <script>
        const supabaseUrl = 'https://assaxxfdxtycdqkkkgpc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzc2F4eGZkeHR5Y2Rxa2trZ3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjk4MDQsImV4cCI6MjA5MjYwNTgwNH0.5L3XfA3GOQqIzzNGOBZRTSINqGugDp1sj07BBYpsqEc';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        const swalDark = Swal.mixin({
            background: '#1f2937', color: '#fff',
            confirmButtonColor: '#39ff14', cancelButtonColor: '#ef4444',
            customClass: { confirmButton: 'text-black font-bold px-6 py-2 rounded', cancelButton: 'font-bold px-6 py-2 rounded' }
        });

        const swalGold = Swal.mixin({
            background: '#121212', color: '#fff',
            confirmButtonColor: '#FFD700', cancelButtonColor: '#4b5563',
            customClass: { confirmButton: 'text-black font-bold px-6 py-2 rounded', cancelButton: 'font-bold px-6 py-2 rounded text-white' }
        });

        // --- FUNGSI MODE KOMUNITAS (LAMA) ---
        async function joinRoom() {
            const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (!code) return swalDark.fire('Oops!', 'Masukkan kode room terlebih dahulu!', 'warning');
            const { data, error } = await db.from('garda_rooms').select('id').eq('room_code', code).single();
            if (error || !data) { swalDark.fire('Tidak Ditemukan', 'Kode Room tidak valid.', 'error'); } 
            else {
                localStorage.setItem('garda_room_code', code);
                window.location.href = `room.html?id=${code}`;
            }
        }

        function createRoom() {
            swalDark.fire({
                title: 'Durasi Sewa Lapangan?',
                input: 'number', inputValue: 120, inputAttributes: { min: 30 },
                showCancelButton: true, confirmButtonText: 'Buat Room', cancelButtonText: 'Batal'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    swalDark.fire({ title: 'Membuat Room...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                    const randomCode = 'GARDA' + Math.floor(100 + Math.random() * 900);
                    await db.from('garda_rooms').insert([{ room_code: randomCode, total_duration: parseInt(result.value) }]);
                    localStorage.setItem('garda_admin_room', randomCode);
                    window.location.href = `admin.html?id=${randomCode}`;
                }
            });
        }

        // --- FUNGSI MODE TURNAMEN (BARU) ---
        async function joinTourney() {
            const code = document.getElementById('tourneyCodeInput').value.trim().toUpperCase();
            if (!code) return swalGold.fire('Oops!', 'Masukkan Kode Turnamen!', 'warning');
            const { data, error } = await db.from('garda_tourney_rooms').select('id').eq('room_code', code).single();
            if (error || !data) { swalGold.fire('Tidak Ditemukan', 'Kode Turnamen tidak valid.', 'error'); } 
            else {
                localStorage.setItem('garda_tourney_code', code);
                window.location.href = `turnamen.html?id=${code}`;
            }
        }

        function createTourney() {
            swalGold.fire({
                title: 'Konfigurasi Turnamen',
                html: `
                    <div class="text-left text-sm mt-4 space-y-4">
                        <div><label class="block text-gold mb-1 font-bold">Total Durasi Acara (Menit):</label>
                        <input id="swal-t-dur" type="number" value="180" class="w-full p-2 bg-gray-900 border border-gray-700 rounded text-white focus:outline-none"></div>
                        
                        <div><label class="block text-gold mb-1 font-bold">Tipe Turnamen:</label>
                        <select id="swal-t-type" class="w-full p-2 bg-gray-900 border border-gray-700 rounded text-white focus:outline-none">
                            <option value="grand_final">Kualifikasi + Grand Final 5v5</option>
                            <option value="klasik">Klasik (Poin Tertinggi Juara)</option>
                        </select></div>
                    </div>
                `,
                showCancelButton: true, confirmButtonText: 'Buat Turnamen', cancelButtonText: 'Batal',
                preConfirm: () => {
                    return {
                        duration: document.getElementById('swal-t-dur').value,
                        type: document.getElementById('swal-t-type').value
                    }
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    swalGold.fire({ title: 'Menyiapkan Engine Turnamen...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                    const randomCode = 'TOURNEY' + Math.floor(100 + Math.random() * 900);
                    await db.from('garda_tourney_rooms').insert([{ 
                        room_code: randomCode, 
                        total_duration: parseInt(result.value.duration),
                        tourney_type: result.value.type
                    }]);
                    localStorage.setItem('garda_tourney_admin', randomCode);
                    window.location.href = `admin-turnamen.html?id=${randomCode}`;
                }
            });
        }

        function resetData() {
            localStorage.clear();
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Cache dibersihkan', showConfirmButton: false, timer: 1500, background: '#1f2937', color: '#fff' });
        }
    </script>
</body>
</html>
