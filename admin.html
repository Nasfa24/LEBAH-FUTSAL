<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Garda Futsal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { neon: '#39ff14', dark: '#121212' } } }
        }
    </script>
</head>
<body class="bg-dark text-white min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center border-b border-gray-800 pb-4 mb-6">
            <h1 class="text-2xl font-black italic">PANITIA <span class="text-blue-500">GARDA</span></h1>
            <div id="roomStatus" class="bg-gray-800 px-4 py-2 rounded font-mono text-neon font-bold">KODE: MEMUAT...</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- PANEL 1: REGISTRASI PEMAIN -->
            <div class="bg-gray-900 border border-gray-800 p-5 rounded-xl">
                <h2 class="text-lg font-bold mb-4 border-b border-gray-700 pb-2 text-blue-400">1. Registrasi Pemain</h2>
                <div class="flex flex-col gap-3">
                    <input type="text" id="playerName" placeholder="Nama Pemain" class="p-2 bg-gray-800 border border-gray-700 rounded text-white focus:border-blue-400 focus:outline-none">
                    <select id="playerPosition" class="p-2 bg-gray-800 border border-gray-700 rounded text-white focus:outline-none">
                        <option value="outfield">Pemain Lapangan (Outfield)</option>
                        <option value="gk">Kiper (GK)</option>
                    </select>
                    <button onclick="addPlayer()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded transition">+ Tambah ke Roster</button>
                </div>
            </div>

            <!-- PANEL 2: DAFTAR CHECK-IN -->
            <div class="bg-gray-900 border border-gray-800 p-5 rounded-xl md:col-span-2 flex flex-col">
                <div class="flex justify-between items-center border-b border-gray-700 pb-2 mb-4">
                    <h2 class="text-lg font-bold text-neon">2. Roster Hadir (Check-In)</h2>
                    <span id="playerCount" class="text-sm text-gray-400">Total: 0</span>
                </div>
                
                <div id="playerList" class="flex-grow overflow-y-auto max-h-60 space-y-2 mb-4 pr-2">
                    <!-- List pemain muncul di sini via JS -->
                </div>

                <!-- PANEL 3: EKSEKUSI ALGORITMA -->
                <button onclick="generateSchedule()" class="w-full bg-neon text-black font-black py-4 rounded hover:bg-green-400 transition text-lg mt-auto">
                    MULAI ACAK JADWAL OTOMATIS
                </button>
            </div>
        </div>
    </div>

    <script>
        // INISIALISASI SUPABASE (ARUS)
        const supabaseUrl = 'https://assaxxfdxtycdqkkkgpc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzc2F4eGZkeHR5Y2Rxa2trZ3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjk4MDQsImV4cCI6MjA5MjYwNTgwNH0.5L3XfA3GOQqIzzNGOBZRTSINqGugDp1sj07BBYpsqEc';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentRoomId = null;
        let currentRoomDuration = 120; // Default

        // AMBIL DATA ROOM SAAT HALAMAN DIMUAT
        async function initAdmin() {
            const urlParams = new URLSearchParams(window.location.search);
            let roomCode = urlParams.get('id') || localStorage.getItem('garda_admin_room');

            if (!roomCode) {
                alert("Akses ditolak! Silakan buat room dari halaman depan.");
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('roomStatus').innerText = `KODE: ${roomCode}`;

            const { data, error } = await supabase.from('garda_rooms').select('*').eq('room_code', roomCode).single();
            if (data) {
                currentRoomId = data.id;
                currentRoomDuration = data.total_duration;
                fetchPlayers();
            }
        }

        // FUNGSI TAMBAH PEMAIN
        async function addPlayer() {
            const name = document.getElementById('playerName').value.trim();
            const position = document.getElementById('playerPosition').value;

            if (!name) return alert("Nama tidak boleh kosong!");

            const { error } = await supabase.from('garda_players').insert([
                { room_id: currentRoomId, name: name, position: position }
            ]);

            if (error) console.error(error);
            else {
                document.getElementById('playerName').value = '';
                fetchPlayers();
            }
        }

        // FUNGSI TARIK DATA PEMAIN UNTUK CHECK-IN
        async function fetchPlayers() {
            const { data, error } = await supabase.from('garda_players').select('*').eq('room_id', currentRoomId).order('created_at', { ascending: true });
            
            if (data) {
                const list = document.getElementById('playerList');
                list.innerHTML = '';
                document.getElementById('playerCount').innerText = `Total: ${data.length}`;

                data.forEach(p => {
                    const color = p.position === 'gk' ? 'bg-purple-900 text-purple-200' : 'bg-gray-800 text-gray-200';
                    const label = p.position === 'gk' ? 'GK' : 'OUT';
                    list.innerHTML += `
                        <div class="flex justify-between items-center p-3 rounded border border-gray-700 ${color}">
                            <span class="font-bold uppercase">${p.name}</span>
                            <span class="text-xs font-mono px-2 py-1 bg-black rounded border border-gray-600">${label}</span>
                        </div>
                    `;
                });
            }
        }

        // ALGORITMA MATCHMAKING OTOMATIS (CORE ENGINE)
        async function generateSchedule() {
            const btn = document.querySelector('button[onclick="generateSchedule()"]');
            btn.disabled = true;
            btn.innerText = "MENGACAK JADWAL...";

            // 1. Ambil semua pemain yang terdaftar
            const { data: players } = await supabase.from('garda_players').select('*').eq('room_id', currentRoomId);
            
            if (players.length < 10) {
                alert("Pemain minimal 10 orang (8 Outfield + 2 GK) untuk memulai!");
                btn.disabled = false;
                btn.innerText = "MULAI ACAK JADWAL OTOMATIS";
                return;
            }

            // 2. Kalkulasi jumlah pertandingan berdasarkan rumus[cite: 1]
            // N = floor((Durasi - Buffer 10 mnt) / (Main 7 + Jeda 3))
            const t_buffer = 10;
            const t_main = 7;
            const t_jeda = 3;
            const totalMatches = Math.floor((currentRoomDuration - t_buffer) / (t_main + t_jeda));

            // Simulasi struktur data di memori sebelum di-push ke database
            let localPlayers = JSON.parse(JSON.stringify(players));
            let matchesToInsert = [];
            let rosterToInsert = [];

            for (let i = 1; i <= totalMatches; i++) {
                // Pisahkan Outfield dan GK[cite: 1]
                let outfield = localPlayers.filter(p => p.position === 'outfield');
                let gk = localPlayers.filter(p => p.position === 'gk');

                // Prioritas Pemerataan Menit Bermain: Sortir berdasarkan jumlah_main[cite: 1]
                outfield.sort((a, b) => a.jumlah_main - b.jumlah_main);
                gk.sort((a, b) => a.jumlah_main - b.jumlah_main);

                // Ambil 8 Outfield dan 2 GK
                let selectedOutfield = outfield.slice(0, 8);
                let selectedGK = gk.slice(0, 2);

                // Acak secara buta (Fisher-Yates) sebelum dibagi ke Tim A dan B[cite: 1]
                selectedOutfield = selectedOutfield.sort(() => Math.random() - 0.5);
                selectedGK = selectedGK.sort(() => Math.random() - 0.5);

                // Catat di struktur memori pertandingan
                const matchId = crypto.randomUUID(); // Buat ID statis untuk relasi roster
                matchesToInsert.push({
                    id: matchId,
                    room_id: currentRoomId,
                    match_number: i,
                    status: i === 1 ? 'active' : 'pending' // Pertandingan pertama langsung aktif
                });

                // Masukkan Roster Tim A
                for (let j=0; j<4; j++) rosterToInsert.push({ match_id: matchId, player_id: selectedOutfield[j].id, team_side: 'A' });
                rosterToInsert.push({ match_id: matchId, player_id: selectedGK[0].id, team_side: 'A' });

                // Masukkan Roster Tim B
                for (let j=4; j<8; j++) rosterToInsert.push({ match_id: matchId, player_id: selectedOutfield[j].id, team_side: 'B' });
                rosterToInsert.push({ match_id: matchId, player_id: selectedGK[1].id, team_side: 'B' });

                // Update jumlah_main di memori lokal untuk iterasi jadwal berikutnya[cite: 1]
                selectedOutfield.forEach(p => p.jumlah_main += 1);
                selectedGK.forEach(p => p.jumlah_main += 1);
            }

            // 3. Batch Insert ke Supabase
            // Hapus jadwal lama jika ada (preventif)
            await supabase.from('garda_matches').delete().eq('room_id', currentRoomId);
            
            // Insert Matches
            await supabase.from('garda_matches').insert(matchesToInsert);
            
            // Insert Roster
            await supabase.from('garda_match_roster').insert(rosterToInsert);

            // Update status room[cite: 1]
            await supabase.from('garda_rooms').update({ status: 'playing' }).eq('id', currentRoomId);

            alert(`Sukses! ${totalMatches} Jadwal Pertandingan telah terbentuk.`);
            
            // Redirect atau ubah UI ke mode Eksekusi Skor
            window.location.reload(); 
        }

        // Jalankan saat pertama kali dibuka
        initAdmin();
    </script>
</body>
</html>
